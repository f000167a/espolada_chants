<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Match — Espolada Hokkaido</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --sky: #29abe2;
  --sky-dim: rgba(41,171,226,0.08);
  --sky-border: rgba(41,171,226,0.2);
  --bg: #f0f7fc;
  --surface: #ffffff;
  --text: #1a1a2e;
  --muted: #8899aa;
  --border: rgba(0,0,0,0.07);
  --win: #2ecc71;
  --loss: #e74c3c;
  --draw: #f39c12;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.container {
  max-width: 640px;
  margin: 0 auto;
  padding: 32px 16px 64px;
}

/* ── HEADER ── */
.site-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.25em;
  color: var(--sky);
  text-transform: uppercase;
  margin-bottom: 32px;
}
.site-title a {
  color: inherit;
  text-decoration: none;
  opacity: 0.6;
  transition: opacity 0.15s;
}
.site-title a:hover { opacity: 1; }
.site-title span { opacity: 0.4; margin: 0 6px; }

/* ── NEXT MATCH CARD ── */
.next-card {
  background: var(--surface);
  border: 1.5px solid var(--sky-border);
  border-radius: 16px;
  padding: 28px 24px 24px;
  margin-bottom: 32px;
  box-shadow: 0 4px 24px rgba(41,171,226,0.08);
}

.next-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  color: var(--sky);
  text-transform: uppercase;
  margin-bottom: 16px;
}

.season-over {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--muted);
  padding: 12px 0;
}

.match-node {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.55rem;
  color: var(--muted);
  letter-spacing: 0.2em;
  margin-bottom: 8px;
}

.match-date-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 20px;
}

.match-date {
  font-size: 1.5rem;
  font-weight: 900;
  color: var(--text);
}

.match-time {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.85rem;
  color: var(--muted);
}

.match-vs {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 18px;
}

.team-name {
  font-size: 1rem;
  font-weight: 900;
}
.team-name.espolada { color: var(--sky); }

.vs-sep {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  flex-shrink: 0;
}

.match-meta {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.meta-pill {
  font-size: 0.72rem;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--muted);
}
.meta-pill.home {
  border-color: var(--sky-border);
  background: var(--sky-dim);
  color: var(--sky);
}

.x-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #000;
  color: #fff;
  border: none;
  border-radius: 20px;
  padding: 10px 18px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.05em;
  cursor: pointer;
  text-decoration: none;
  transition: opacity 0.15s;
}
.x-btn:hover { opacity: 0.8; }
.x-btn svg { flex-shrink: 0; }

/* ── SCHEDULE LIST ── */
.section-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.schedule-list {
  background: var(--surface);
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
}

.schedule-item {
  display: grid;
  grid-template-columns: 28px 80px 1fr 52px;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.schedule-item:last-child { border-bottom: none; }
.schedule-item:hover { background: #f8fbfd; }
.schedule-item.next-up { background: var(--sky-dim); }

.s-node {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.6rem;
  color: var(--muted);
  text-align: center;
}

.s-date {
  font-size: 0.72rem;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
}

.s-opponent {
  font-size: 0.85rem;
  font-weight: 700;
}

.s-ha {
  font-size: 0.6rem;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
}
.s-ha.home { color: var(--sky); }

.s-result {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  font-weight: 700;
  text-align: right;
}
.s-result.win  { color: var(--win); }
.s-result.loss { color: var(--loss); }
.s-result.draw { color: var(--draw); }
.s-result.upcoming { color: var(--muted); font-weight: 400; }

</style>
</head>
<body>
<div class="container">
  <div class="site-title">
    <a href="./index.html">Chant Book</a>
    <span>/</span>
    Next Match
  </div>

  <div id="next-card" class="next-card">
    <div class="next-label">Loading…</div>
  </div>

  <div class="section-title">2025-26 全試合日程</div>
  <div id="schedule-list" class="schedule-list"></div>
</div>

<script>
const DAYS = ["日","月","火","水","木","金","土"];

function formatDate(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return `${d.getMonth()+1}/${d.getDate()}（${DAYS[d.getDay()]}）`;
}

function resultClass(result) {
  if (!result) return "upcoming";
  if (result.startsWith("○")) return "win";
  if (result.startsWith("●")) return "loss";
  if (result.startsWith("△")) return "draw";
  return "";
}

function buildXText(match, season) {
  const ha = match.home ? "🏠ホーム" : "✈️アウェイ";
  const date = formatDate(match.date);
  const text = `【次節情報】メットライフ生命Fリーグ${season} 第${match.node}節\n`
    + `${date} ${match.time}KO\n`
    + `エスポラーダ北海道 vs ${match.opponent}\n`
    + `${ha}｜${match.venue}\n`
    + `\n一緒に応援しよう！⚽️💙\n`
    + `#エスポラーダ北海道 #Fリーグ`;
  return encodeURIComponent(text);
}

async function loadSchedule() {
  const res = await fetch("./schedule.json");
  const data = await res.json();
  const today = new Date();
  today.setHours(0,0,0,0);

  const matches = data.matches;
  const nextMatch = matches.find(m => new Date(m.date) >= today && !m.result);
  const card = document.getElementById("next-card");

  if (nextMatch) {
    const xText = buildXText(nextMatch, data.season);
    card.innerHTML = `
      <div class="next-label">Next Match — 第${nextMatch.node}節</div>
      <div class="match-date-row">
        <div class="match-date">${formatDate(nextMatch.date)}</div>
        <div class="match-time">${nextMatch.time} KO</div>
      </div>
      <div class="match-vs">
        <div class="team-name espolada">エスポラーダ北海道</div>
        <div class="vs-sep">vs</div>
        <div class="team-name">${nextMatch.opponent}</div>
      </div>
      <div class="match-meta">
        <div class="meta-pill ${nextMatch.home ? "home" : ""}">${nextMatch.home ? "🏠 ホーム" : "✈️ アウェイ"}</div>
        <div class="meta-pill">${nextMatch.venue}</div>
      </div>
      <a class="x-btn" href="https://twitter.com/intent/tweet?text=${xText}" target="_blank" rel="noopener">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.732-8.867L1.245 2.25H8.38l4.253 5.622L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
        Xでポスト
      </a>
    `;
  } else {
    card.innerHTML = `
      <div class="next-label">Next Match</div>
      <div class="season-over">2025-26シーズン終了 🏆<br><small style="font-weight:400;color:var(--muted);font-size:0.85rem">優勝 — エスポラーダ北海道</small></div>
    `;
  }

  // Schedule list
  const listEl = document.getElementById("schedule-list");
  matches.forEach(m => {
    const isNext = nextMatch && m.node === nextMatch.node;
    const rc = resultClass(m.result);
    const div = document.createElement("div");
    div.className = "schedule-item" + (isNext ? " next-up" : "");
    div.innerHTML = `
      <div class="s-node">${m.node}</div>
      <div class="s-date">${formatDate(m.date)}</div>
      <div>
        <div class="s-opponent">${m.opponent}</div>
        <div class="s-ha ${m.home ? "home" : ""}">${m.home ? "HOME" : "AWAY"} · ${m.venue}</div>
      </div>
      <div class="s-result ${rc}">${m.result || m.time}</div>
    `;
    listEl.appendChild(div);
  });
}

loadSchedule().catch(err => {
  document.getElementById("next-card").innerHTML =
    `<div class="next-label">Next Match</div><div class="season-over" style="color:var(--loss)">データ取得失敗</div>`;
});
</script>
</body>
</html>
